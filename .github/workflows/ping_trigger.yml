name: External ping receiver (workflow_dispatch trigger)
# This workflow is called by cron-job.org every 15 minutes
# It simply triggers full_update.yml via workflow_dispatch
# — bypasses GitHub's unreliable scheduled cron queue entirely

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Caller (cron-job.org / manual)'
        required: false
        default: 'external'

permissions:
  contents: write
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger full_update
        run: |
          echo "Triggered by: ${{ github.event.inputs.source }} at $(date -u)"
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/full_update.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "full_update dispatched OK" \
            || echo "dispatch failed"
