name: Refresh market data (indices + holdings + signals)

on:
  push:
    paths-ignore:          # portfolio/data/** and JSON commits come FROM this workflow — skip to avoid cascade loop
      - 'portfolio/data/**'
      - '*.json'
      - '.github/**'
  schedule:
    - cron: "*/15 4-10 * * 1-5"    # India market hours  04:00–10:59 UTC (9:30–4:30 IST)
    - cron: "*/15 11-12 * * 1-5"   # Bridge gap          11:00–12:59 UTC (7:00–8:59 ET, US pre-market)
    - cron: "*/15 13-21 * * 1-5"   # US market hours     13:00–21:59 UTC (9:00–5:59 ET, covers EST winter)
  workflow_dispatch:                  # manual trigger (works any time)

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: false   # don't cancel in-progress runs — let them finish

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install yfinance pytz requests beautifulsoup4

      - name: Fetch live prices
        run: |
          python portfolio/scripts/market_data.py
          if [ $? -ne 0 ]; then
            echo "::error::market_data.py failed — prices not updated"
            exit 1
          fi

      - name: Compute signals
        run: |
          python portfolio/scripts/signals_update.py || echo "::warning::signals_update.py failed — signals stale but prices still updated"

      - name: Audit + self-heal data
        run: python portfolio/scripts/data_audit.py || echo "audit script error — skipping"

      - name: Patch chart values (broker-anchored us_val_usd, Oct–Nov prepend)
        run: python portfolio/scripts/patch_chart.py || echo "patch_chart error — skipping"

      - name: Commit if changed
        run: |
          git add portfolio/data/processed portfolio/data/holdings_cost.json
          if [[ -n "$(git diff --cached --name-only)" ]]; then
            git config user.name  "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              git fetch origin main
              git rebase origin/main && git push && break
              echo "push attempt $attempt failed — retrying in 5s…"
              sleep 5
            done
            # Last resort: if rebase keeps failing, reset to remote + re-apply data commit
            if ! git push 2>/dev/null; then
              echo "Rebase failed 3x — force-syncing data files only"
              git rebase --abort 2>/dev/null || true
              git reset --soft HEAD~1
              git fetch origin main
              git reset --hard origin/main
              git add portfolio/data/processed portfolio/data/holdings_cost.json
              git diff --cached --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
              git push
            fi
          else
            echo "no changes"
          fi

      - name: Report failure summary
        if: failure()
        run: echo "::error::WORKFLOW FAILURE at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
# 2026-05-19T16:08Z
