name: Refresh market data (indices + holdings + signals)

on:
  schedule:
    - cron: "*/15 4-10 * * 1-5"    # India market hours  04:00–10:59 UTC (9:30–4:30 IST)
    - cron: "*/15 13-20 * * 1-5"   # US market hours     13:00–20:59 UTC (9:00–4:59 ET)
  workflow_dispatch:                  # manual trigger (works any time)
  push:
    branches: [main]
    paths:
      - "data/holdings_cost.json"    # new position added → fetch prices immediately

permissions:
  contents: write                     # needed to commit the updated JSON back

concurrency:
  group: market-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10              # increased: signals fetch 2y history for ~13 tickers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install yfinance pytz requests beautifulsoup4

      - name: Fetch live prices
        run: |
          python scripts/market_data.py
          if [ $? -ne 0 ]; then
            echo "::error::market_data.py failed — prices not updated"
            exit 1
          fi

      - name: Compute signals
        run: python scripts/signals_update.py || echo "WARNING: signals_update.py failed — signals not updated"

      - name: Commit if changed
        run: |
          # Stage data/processed AND holdings_cost.json (FX rate updated there)
          git add data/processed data/holdings_cost.json
          if [[ -n "$(git diff --cached --name-only)" ]]; then
            git config user.name  "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $attempt failed — retrying in 5s…"
              sleep 5
            done
          else
            echo "no changes"
          fi

      - name: Report failure summary
        if: failure()
        run: echo "::error::WORKFLOW FAILURE at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
