const PrivacyCtx = createContext(false);

// ── HELPERS ────────────────────────────────────────────────────────────────
const fmt     = (n, dec = 0) => new Intl.NumberFormat("en-IN", { maximumFractionDigits: dec, minimumFractionDigits: dec }).format(n);
const fmtCr   = n => { const cr = n / 10000000; return cr >= 1 ? `₹${cr.toFixed(2)} Cr` : `₹${fmt(n / 100000, 1)}L`; };
const fmtUSD  = (n, rates) => `$${fmt(n / rates.USD_INR, 0)}`;
const fmtQAR  = (n, rates) => `QAR ${fmt(n / rates.QAR_INR, 0)}`;
const pct     = (val, total) => total ? Math.min(100, (val / total) * 100) : 0;
const nowStr  = () => new Date().toLocaleDateString("en-IN", { month: "short", year: "numeric" });
const todayKey = () => new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });

function inrTo(valueINR, currency, rates) {
  if (currency === "INR") return fmtCr(valueINR);
  if (currency === "USD") return `$${fmt(valueINR / rates.USD_INR, 0)}`;
  if (currency === "QAR") return `QAR ${fmt(valueINR / rates.QAR_INR, 0)}`;
  return fmtCr(valueINR);
}

function pnlInfo(principal, current) {
  if (!principal) return null;
  const pnl = current - principal;
  const p   = ((pnl / principal) * 100).toFixed(1);
  return { pnl, pct: p, color: pnl >= 0 ? "#34d399" : "#f87171", sign: pnl >= 0 ? "+" : "" };
}

function useStorage() {
  const load = () => {
    try { const r = localStorage.getItem(STORAGE_KEY); return r ? { ...DEFAULT_MANUAL, ...JSON.parse(r) } : { ...DEFAULT_MANUAL }; }
    catch { return { ...DEFAULT_MANUAL }; }
  };
  const [data, setData] = useState(load);
  const save = useCallback(d => { setData(d); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }, []);
  return [data, save];
}

// Compute live current values from holdings_cost + holdings_prices
function computePortfolioValues(cost, prices) {
  const usOpen = cost?.us?.open || [];
  const inOpen = cost?.india?.open || [];

  let usCostUSD = 0, usCurrentUSD = 0;
  usOpen.forEach(pos => {
    usCostUSD += pos.cost_usd || 0;
    const ltp = prices?.[pos.ticker]?.ltp || 0;
    usCurrentUSD += ltp > 0 ? (pos.qty || 0) * ltp : (pos.cost_usd || 0);
  });

  let inCostINR = 0, inCurrentINR = 0;
  inOpen.forEach(pos => {
    inCostINR += pos.cost_inr || 0;
    const ltp = prices?.[pos.ticker]?.ltp || 0;
    inCurrentINR += ltp > 0 ? (pos.qty || 0) * ltp : (pos.cost_inr || 0);
  });

  return { usCostUSD, usCurrentUSD, inCostINR, inCurrentINR, pricesAt: prices?._updated_at };
}

// ── MINI COMPONENTS ────────────────────────────────────────────────────────

}

// Privacy-aware value wrapper — renders MASK when privacy is on
function Pv({ children, style }) {

}

        <div style={{ width: privacy ? "0%" : `${p}%`, height: "100%", background: `linear-gradient(90deg, ${color}88, ${color})`, borderRadius: 6, transition: "width 1s ease" }} />
      </div>

}

function InvestmentCard({ label, principalINR, currentINR, principalUSD, currentUSD, view, currency, rates, note, color, loading }) {
  const privacy  = useContext(PrivacyCtx);

          <div style={{ fontSize: 10, color: "#374151", marginTop: 2, fontFamily: "DM Sans" }}>{loading ? "⏳ Fetching live prices…" : note}</div>
          {view === "current" && info && !privacy && (
            <div style={{ marginTop: 6, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 9, color: "#475569", background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 4, padding: "2px 6px", fontFamily: "DM Mono" }}>
                Cost: {isUSD ? `$${fmt(principalUSD, 0)}` : fmtCr(principal)}

              <span style={{ fontSize: 10, color: info.color, background: info.color + "15", borderRadius: 4, padding: "2px 6px", fontFamily: "DM Mono", fontWeight: 700 }}>
                {info.sign}{info.pct}% · {isUSD ? `$${fmt(Math.abs(info.pnl) / rates.USD_INR, 0)}` : fmtCr(Math.abs(info.pnl))}
              </span>
            </div>
          )}
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: view === "current" && info ? info.color : color, fontFamily: "DM Mono" }}>
            {privacy ? MASK : inrTo(displayVal, currency, rates)}
          </div>
          {!privacy && currency !== "INR" && <div style={{ fontSize: 10, color: "#475569", fontFamily: "DM Mono" }}>{fmtCr(displayVal)}</div>}
        </div>
      </div>
    </Card>
  );
}

function LineChart({ data, keys, colors, labels, height = 160 }) {
  const privacy = useContext(PrivacyCtx);
  if (!data || data.length < 2) return (
    <div style={{ textAlign: "center", color: "#374151", fontSize: 11, fontFamily: "DM Sans", padding: 20 }}>Need at least 2 data points</div>
  );
  const allVals = data.flatMap(d => keys.map(k => d[k]).filter(v => v != null));
  const min = Math.min(...allVals) * 0.95;
  const max = Math.max(...allVals) * 1.02;
  const W = 520, H = height;
  const xStep = W / (data.length - 1);
  const yScale = v => H - ((v - min) / (max - min)) * H;
  const path = key => data.map((d, i) => `${i === 0 ? "M" : "L"}${i * xStep},${yScale(d[key])}`).join(" ");
  return (
    <div style={{ overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H + 30}`} style={{ width: "100%", minWidth: 300 }}>
        {[0.25, 0.5, 0.75, 1].map(f => (
          <line key={f} x1={0} y1={yScale(min + (max - min) * f)} x2={W} y2={yScale(min + (max - min) * f)} stroke="#1e2d45" strokeWidth={1} strokeDasharray="4,4" />
        ))}
        {keys.map((k, ki) => (
          <g key={k}>
            <path d={path(k)} fill="none" stroke={colors[ki]} strokeWidth={2.5} strokeLinejoin="round" />
            {!privacy && data.map((d, i) => d[k] != null && (
              <circle key={i} cx={i * xStep} cy={yScale(d[k])} r={3} fill={colors[ki]} />
            ))}
          </g>
        ))}
        {data.map((d, i) => (
          <text key={i} x={i * xStep} y={H + 20} textAnchor="middle" fill="#475569" fontSize={9} fontFamily="DM Mono">
            {d.year || d.month?.split(" ")[0]}
          </text>
        ))}
        {keys.map((k, ki) => (
          <g key={k} transform={`translate(${ki * 130}, ${H + 28})`}>
            <rect width={8} height={3} fill={colors[ki]} rx={1} y={-1} />
            <text x={12} fill="#a0aec0" fontSize={8} fontFamily="DM Sans">{labels[ki]}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function DonutChart({ slices }) {
  const privacy = useContext(PrivacyCtx);
  const total = slices.reduce((s, x) => s + x.value, 0);
  let angle = -90;
  const R = 60, cx = 80, cy = 80;
  const arcs = slices.map(s => {
    const a = (s.value / total) * 360;
    const start = angle;
    angle += a;
    const r2d = d => (d * Math.PI) / 180;
    const x1 = cx + R * Math.cos(r2d(start)), y1 = cy + R * Math.sin(r2d(start));
    const x2 = cx + R * Math.cos(r2d(angle - 0.1)), y2 = cy + R * Math.sin(r2d(angle - 0.1));
    return { ...s, d: `M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${a > 180 ? 1 : 0} 1 ${x2} ${y2} Z`, pct: ((s.value / total) * 100).toFixed(1) };
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
      <svg viewBox="0 0 160 160" style={{ width: 140, flexShrink: 0 }}>
        <circle cx={cx} cy={cy} r={38} fill="#0d1525" />
        {arcs.map((a, i) => <path key={i} d={a.d} fill={privacy ? "#1e2d45" : a.color} opacity={0.9} />)}
        <text x={cx} y={cy - 6} textAnchor="middle" fill="#e2e8f0" fontSize={11} fontWeight="bold" fontFamily="DM Mono">NET</text>
        <text x={cx} y={cy + 8} textAnchor="middle" fill="#e2e8f0" fontSize={11} fontWeight="bold" fontFamily="DM Mono">WORTH</text>
      </svg>
      <div style={{ flex: 1 }}>
        {arcs.map((a, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: a.color, flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: "#a0aec0", fontFamily: "DM Sans", flex: 1 }}>{a.label}</span>
            <span style={{ fontSize: 10, color: "#64748b", fontFamily: "DM Mono" }}>{privacy ? "***" : `${a.pct}%`}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

}

function ParamHistoryTable({ history }) {
  const privacy = useContext(PrivacyCtx);
  if (!history || history.length === 0) return (

    </div>
  );
  const sorted = [...history].sort((a, b) => new Date(a.date) - new Date(b.date));
  const ROWS = [

    { label: "Net Worth",         field: "nw" },
    { label: "Gross Assets",      field: "grossAssets" },
    { label: "Total Liabilities", field: "totalLiabilities", isLiability: true },
    { section: "📈 STOCKS & MF", isHeader: true },
    { label: "US Stocks — Cost (INR)",    field: "usStocksPrincipalINR" },
    { label: "US Stocks — Current (INR)", field: "usStocksINR" },
    { label: "India Stocks — Cost (INR)", field: "indiaStocksPrincipal" },
    { label: "India Stocks — Current",    field: "indiaStocksINR" },
    { label: "Indian MF — Principal",     field: "mfPrincipal" },
    { label: "Indian MF — Current Value", field: "mfCurrentValue" },
    { section: "💎 ASSETS", isHeader: true },
    { label: "F&O Corpus",    field: "foCorpus" },
    { label: "Gold",          field: "goldJewellery" },
    { label: "Apartment",     field: "apartment" },
    { label: "Gratuity",      field: "gratuity" },
    { section: "🏦 BANKS", isHeader: true },
    { label: "Qatar Banks (INR)", field: "qatarBanksINR" },
    { label: "India Banks (INR)", field: "indiaBanksINR" },
    { section: "📉 LIABILITIES", isHeader: true },
    { label: "Home Loan", field: "apartmentLoan", isLiability: true },
    { label: "Car Loan",  field: "carLoan",        isLiability: true },
  ];
  const fmtCell = v => (v == null || v === 0) ? <span style={{ color: "#1e2d45" }}>—</span> : (privacy ? "***" : fmtCr(v));
  const getTrend = (field, snaps) => {
    const vals = snaps.map(s => s[field]).filter(v => v != null && v !== 0);
    return vals.length < 2 ? null : vals[vals.length - 1] - vals[0];
  };
  return (
    <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", minWidth: sorted.length * 100 + 180 }}>
        <thead>
          <tr>
            <th style={{ position: "sticky", left: 0, zIndex: 2, background: "#060d1a", padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#475569", fontFamily: "DM Sans", textTransform: "uppercase", letterSpacing: 1, borderBottom: "1px solid #1e2d45", minWidth: 200 }}>Parameter</th>
            {sorted.map((h, i) => (
              <th key={i} style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, color: "#f0b429", fontFamily: "DM Mono", borderBottom: "1px solid #1e2d45", whiteSpace: "nowrap", minWidth: 100 }}>{h.date}</th>
            ))}
            <th style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, color: "#a78bfa", fontFamily: "DM Mono", borderBottom: "1px solid #1e2d45", minWidth: 90 }}>TREND</th>
          </tr>
        </thead>
        <tbody>
          {ROWS.map((row, ri) => {
            if (row.isHeader) return (
              <tr key={ri}><td colSpan={sorted.length + 2} style={{ padding: "10px 12px 4px", fontSize: 9, color: "#f0b429", fontFamily: "DM Sans", textTransform: "uppercase", letterSpacing: 2, background: "#060d1a", borderTop: "1px solid #1e2d45" }}>{row.section}</td></tr>
            );
            const trend = getTrend(row.field, sorted);
            const isL = row.isLiability;
            const tColor = trend == null ? "#374151" : (isL ? (trend < 0 ? "#34d399" : "#f87171") : (trend >= 0 ? "#34d399" : "#f87171"));
            return (
              <tr key={ri} style={{ borderBottom: "1px solid #0d1525" }}
                onMouseEnter={e => e.currentTarget.style.background = "#0d1a2d"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <td style={{ position: "sticky", left: 0, background: "#060d1a", padding: "7px 12px", fontSize: 11, color: "#94a3b8", fontFamily: "DM Sans" }}>{row.label}</td>
                {sorted.map((h, i) => {
                  const val = h[row.field];
                  const prev = i > 0 ? sorted[i - 1][row.field] : null;
                  const diff = (val != null && prev != null) ? val - prev : null;
                  const dColor = diff == null ? null : (isL ? (diff < 0 ? "#34d399" : "#f87171") : (diff >= 0 ? "#34d399" : "#f87171"));
                  return (
                    <td key={i} style={{ padding: "7px 12px", textAlign: "right", fontSize: 11, fontFamily: "DM Mono", color: "#e2e8f0" }}>
                      {fmtCell(val)}
                      {!privacy && diff !== null && diff !== 0 && (
                        <div style={{ fontSize: 8, color: dColor, marginTop: 1 }}>{diff >= 0 ? "▲" : "▼"} {fmtCr(Math.abs(diff))}</div>
                      )}
                    </td>
                  );
                })}
                <td style={{ padding: "7px 12px", textAlign: "right", fontSize: 10, fontFamily: "DM Mono", color: tColor }}>
                  {!privacy && trend != null ? <span style={{ background: tColor + "18", borderRadius: 4, padding: "2px 6px" }}>{trend >= 0 ? "▲" : "▼"} {fmtCr(Math.abs(trend))}</span> : "—"}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── MAIN DASHBOARD ─────────────────────────────────────────────────────────
function Dashboard() {
  const [manual, saveManual] = useStorage();
  const [form, setForm]      = useState(manual);
  const [tab, setTab]        = useState(0);
  const [currency, setCurrency] = useState("INR");
  const [investView, setInvestView] = useState("current");
  const [privacy, setPrivacy] = useState(false);

  const [portfolio, setPortfolio] = useState(null);   // {usCostUSD, usCurrentUSD, inCostINR, inCurrentINR, pricesAt}
  const [goldPrice, setGoldPrice] = useState(null);
  const [rates, setRates]         = useState(FALLBACK);
  const [loading, setLoading]     = useState({ portfolio: true, gold: true, fx: true });
  const [showSaved, setShowSaved] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  const loadGhCfg  = () => { try { const r = localStorage.getItem(GH_CFG_KEY); return r ? JSON.parse(r) : { user: "", repo: "", token: "" }; } catch { return { user: "", repo: "", token: "" }; } };
  const [ghCfg, setGhCfg]   = useState(loadGhCfg);
  const [ghStatus, setGhStatus] = useState("");
  const [ghLoading, setGhLoading] = useState(false);
  const [ghFileSha, setGhFileSha] = useState("");
  const saveGhCfg  = cfg => { setGhCfg(cfg); try { localStorage.setItem(GH_CFG_KEY, JSON.stringify(cfg)); } catch {} };

  // Load data from user's private GitHub repo
  const loadFromGitHub = async () => {
    if (!ghCfg.user || !ghCfg.repo || !ghCfg.token) { setGhStatus("Enter credentials first"); return; }
    setGhLoading(true); setGhStatus("Loading…");
    try {
      const res = await fetch(ghApiUrl(ghCfg.user, ghCfg.repo), { headers: ghHeaders(ghCfg.token) });
      if (!res.ok) throw new Error("GitHub error " + res.status);
      const json = await res.json();
      const decoded = JSON.parse(atob(json.content.split("\n").join("")));
      setGhFileSha(json.sha);
      const merged = { ...DEFAULT_MANUAL, ...decoded };
      saveManual(merged); setForm(merged);
      setGhStatus("Loaded successfully ✅");
    } catch (e) { setGhStatus("Load failed: " + e.message); }
    setGhLoading(false);
  };

  const saveToGitHub = async (data) => {
    if (!ghCfg.user || !ghCfg.repo || !ghCfg.token) return;
    try {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const body = { message: "Wealth update " + todayKey(), content: encoded, ...(ghFileSha ? { sha: ghFileSha } : {}) };
      const res = await fetch(ghApiUrl(ghCfg.user, ghCfg.repo), { method: "PUT", headers: ghHeaders(ghCfg.token), body: JSON.stringify(body) });
      if (!res.ok) throw new Error("GitHub error " + res.status);
      const json = await res.json();
      if (json.content?.sha) setGhFileSha(json.content.sha);
      setGhStatus("Saved to GitHub ✅");
    } catch (e) { setGhStatus("GitHub save failed: " + e.message); }
  };

  // ── DATA FETCHING ──
  // Live FX rates
  useEffect(() => {
    fetch(FX_API).then(r => r.json()).then(d => {
      if (d?.rates) {
        const USD_INR = d.rates.INR || FALLBACK.USD_INR;
        const USD_QAR = d.rates.QAR || FALLBACK.USD_QAR;
        setRates({ USD_INR, QAR_INR: USD_INR / USD_QAR, USD_QAR, _live: true });
      }
      setLoading(p => ({ ...p, fx: false }));
    }).catch(() => setLoading(p => ({ ...p, fx: false })));
  }, []);

  // Portfolio data — fetch holdings_cost.json + holdings_prices.json
  useEffect(() => {
    Promise.all([
      fetch(`${GITHUB_RAW}/holdings_cost.json`).then(r => r.json()),
      fetch(`${GITHUB_RAW}/holdings_prices.json`).then(r => r.json()),
    ]).then(([cost, prices]) => {
      setPortfolio(computePortfolioValues(cost, prices));
      setLoading(p => ({ ...p, portfolio: false }));
    }).catch(() => setLoading(p => ({ ...p, portfolio: false })));
  }, []);

  // Gold price
  useEffect(() => {
    fetch(GOLD_API).then(r => r.json()).then(d => {
      const usdPerOz = Array.isArray(d) ? d[0]?.price : d?.price;
      if (usdPerOz) {
        const g = (usdPerOz / 31.1035) * rates.USD_INR;
        setGoldPrice({ usdPerOz, inrPerGram22k: g * 0.916, inrPerGram24k: g });
      }
      setLoading(p => ({ ...p, gold: false }));
    }).catch(() => setLoading(p => ({ ...p, gold: false })));
  }, [rates.USD_INR]);

  // ── COMPUTED VALUES ──
  // Stock current values — from live portfolio fetch, or fallback to manual cost
  const usCurrentUSD      = portfolio?.usCurrentUSD  || (manual.usStocksPrincipalUSD  || 0);
  const usCurrentINR      = usCurrentUSD * rates.USD_INR;
  const usCostUSD         = portfolio?.usCostUSD     || (manual.usStocksPrincipalUSD  || 0);
  const usCostINR         = usCostUSD * rates.USD_INR;
  const inCurrentINR      = portfolio?.inCurrentINR  || (manual.indiaStocksPrincipal  || 0);
  const inCostINR         = portfolio?.inCostINR     || (manual.indiaStocksPrincipal  || 0);

  // Manual overrides for cost basis (from Update tab)
  const usStocksPrincipalUSD = manual.usStocksPrincipalUSD || usCostUSD;
  const usStocksPrincipalINR = usStocksPrincipalUSD * rates.USD_INR;
  const indiaStocksPrincipal = manual.indiaStocksPrincipal || inCostINR;
  const mfPrincipal          = manual.mfPrincipal    || 0;
  const mfCurrentValue       = manual.mfCurrentValue || 0;

  const qatarBanksQAR = (manual.hsbcSavings||0) + (manual.hsbcCurrent||0) + (manual.dohaBank_sav||0) + (manual.dohaBank_cur||0);
  const qatarBanksINR = qatarBanksQAR * rates.QAR_INR;
  const indiaBanksINR = (manual.yesNRE||0)+(manual.yesNRO||0)+(manual.yesNROInvest||0)+
    (manual.idfcNRE||0)+(manual.indusNRE||0)+(manual.indusNREPIS||0)+(manual.indusNRO||0)+
    (manual.canaraInr||0)+(manual.iobNRE||0)+(manual.sbiNRO||0)+(manual.axisNRE||0)+
    (manual.idfcRI||0)+(manual.hsbc_india||0)+(manual.tala||0);

  const grossAssets = usCurrentINR + inCurrentINR + mfCurrentValue +
    (manual.foCorpus||0) + (manual.goldJewellery||0) + (manual.malabarGold||0) +
    (manual.apartment||0) + (manual.gratuity||0) + (manual.landCruiser||0)*rates.QAR_INR +
    qatarBanksINR + indiaBanksINR;
  const ccLiabilities   = ((manual.qatarAirwaysCC||0) + (manual.luluCC||0)) * rates.QAR_INR;
  const totalLiabilities = (manual.apartmentLoan||0) + (manual.carLoan||0) + ccLiabilities;
  const netWorth         = grossAssets - totalLiabilities;

  const thisMonth     = nowStr();
  const conservative  = CONSERVATIVE_SCHEDULE.find(s => s.month === thisMonth)?.nw || CONSERVATIVE_SCHEDULE[0].nw;
  const kpiDelta      = netWorth - conservative;
  const kpiPct        = ((kpiDelta / conservative) * 100).toFixed(1);

  const sortedHistory  = [...(manual.history || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  const prevSnapshot   = sortedHistory.at(-1) || null;
  const monthChange    = prevSnapshot ? netWorth - prevSnapshot.nw : null;

  const delta    = (v, field) => prevSnapshot?.[field] !== undefined ? v - (prevSnapshot[field]||0) : null;
  const fmtDelta = d => {
    if (d === null) return null;
    const abs = Math.abs(d);
    const val = abs >= 10000000 ? `₹${(abs/10000000).toFixed(2)}Cr` : `₹${(abs/100000).toFixed(1)}L`;
    return { text: `${d >= 0 ? "+" : ""}${val}`, color: d >= 0 ? "#34d399" : "#f87171" };
  };

  const totalInvestPrincipal = usStocksPrincipalINR + indiaStocksPrincipal + mfPrincipal;
  const totalInvestCurrent   = usCurrentINR + inCurrentINR + mfCurrentValue;
  const totalPnL             = totalInvestCurrent - totalInvestPrincipal;
  const totalPnLPct          = totalInvestPrincipal > 0 ? ((totalPnL / totalInvestPrincipal) * 100).toFixed(1) : null;

  const assetSlices = [
    { label: "F&O Corpus",   value: manual.foCorpus||0,                         color: "#f0b429" },
    { label: "India Stocks", value: inCurrentINR,                                color: "#38bdf8" },
    { label: "US Stocks",    value: usCurrentINR,                                color: "#34d399" },
    { label: "Indian MF",    value: mfCurrentValue,                              color: "#818cf8" },
    { label: "Gold",         value: (manual.goldJewellery||0)+(manual.malabarGold||0), color: "#fb923c" },
    { label: "Apartment",    value: manual.apartment||0,                         color: "#a78bfa" },
    { label: "Gratuity",     value: manual.gratuity||0,                          color: "#f472b6" },
    { label: "Cash (Banks)", value: qatarBanksINR + indiaBanksINR,               color: "#6ee7b7" },
  ].filter(s => s.value > 0);

  const handleSave = () => {
    const entry = {
      date: todayKey(), nw: netWorth, conservative, grossAssets, totalLiabilities,
      usStocksINR: usCurrentINR, usStocksPrincipalINR, usStocksPrincipalUSD,
      indiaStocksINR: inCurrentINR, indiaStocksPrincipal,
      mfPrincipal, mfCurrentValue,
      foCorpus: form.foCorpus||0, goldJewellery: form.goldJewellery||0,
      malabarGold: form.malabarGold||0, apartment: form.apartment||0,
      gratuity: form.gratuity||0, tala: form.tala||0,
      qatarBanksINR, indiaBanksINR, apartmentLoan: form.apartmentLoan||0, carLoan: form.carLoan||0,
    };
    const prev = manual.history || [];
    const updated = { ...form, history: [...prev.filter(h => h.date !== entry.date), entry] };
    saveManual(updated);
    setLastSaved(new Date().toLocaleTimeString());
    setShowSaved(true); setTimeout(() => setShowSaved(false), 3000);
    saveToGitHub(updated);
  };

  const D = v => inrTo(v, currency, rates);

  const TABS  = ["Dashboard", "Assets", "Liabilities", "Forecast", "Update", "Performance", "History", "Settings"];
  const ICONS = ["📊", "🏦", "📉", "🔭", "✏️", "📈", "🗓️", "⚙️"];

  return (
    <PrivacyCtx.Provider value={privacy}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #060d1a; }
        .card { background: #0d1a2d; border: 1px solid #1e2d45; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
        .tab-btn { background: none; border: none; cursor: pointer; padding: 8px 12px; border-radius: 8px; font-family: DM Sans; font-size: 12px; transition: all .2s; white-space: nowrap; }
        .tab-btn.active { background: #1e3a5f; color: #f0b429; }
        .tab-btn:not(.active) { color: #475569; }
        .tab-btn:hover:not(.active) { color: #94a3b8; background: #0d1525; }
        .save-btn { background: linear-gradient(135deg,#f0b429,#d97706); border: none; border-radius: 10px; padding: 12px 24px; color: #0d1a2d; font-family: DM Sans; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; margin-top: 8px; transition: opacity .2s; }
        .save-btn:hover { opacity: .9; }
        .privacy-btn { background: none; border: 1px solid #1e2d45; border-radius: 20px; padding: 4px 12px; cursor: pointer; font-size: 15px; transition: all .2s; color: #475569; }
        .privacy-btn.on { border-color: #f0b429; background: #f0b42918; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #060d1a; }
        ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 2px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        tr:hover td { background: #0d1a2d !important; }
      `}</style>

      <div style={{ minHeight: "100vh", background: "#060d1a", padding: "16px", fontFamily: "DM Sans" }}>

        {/* ── HEADER ── */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: 10, color: "#f0b429", textTransform: "uppercase", letterSpacing: 3, fontFamily: "DM Sans", marginBottom: 4 }}>PERSONAL WEALTH TRACKER</div>
              <h1 style={{ fontSize: 26, fontWeight: 900, color: "#e2e8f0", fontFamily: "Playfair Display", lineHeight: 1 }}>
                Sabarna <span style={{ color: "#f0b429" }}>·</span> DBG
              </h1>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
              {/* Currency toggle + privacy eye */}
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <CurrencyToggle currency={currency} setCurrency={setCurrency} rates={rates} />
                <button className={`privacy-btn${privacy ? " on" : ""}`} onClick={() => setPrivacy(p => !p)} title="Toggle privacy">
                  {privacy ? "🙈" : "👁"}
                </button>
              </div>
              {/* Live data status */}
              <div style={{ fontSize: 10, color: "#374151", fontFamily: "DM Mono", textAlign: "right" }}>
                {loading.portfolio ? "⏳ Fetching portfolio…" :
                  portfolio ? (privacy ? "✅ Portfolio live" : `✅ US $${fmt(usCurrentUSD)} · India ₹${(inCurrentINR/100000).toFixed(1)}L`) :
                  "⚠️ Portfolio unavailable — using manual values"}
              </div>
              <div style={{ fontSize: 10, color: "#374151", fontFamily: "DM Mono" }}>
                {loading.gold ? "⏳ Gold…" : goldPrice ? (privacy ? "✅ Gold live" : `✅ Gold ₹${fmt(goldPrice.inrPerGram22k,0)}/g(22K)`) : "⚠️ Gold manual"}&nbsp;
                {rates._live ? `🟢 $1=₹${rates.USD_INR.toFixed(1)} · QAR=₹${rates.QAR_INR.toFixed(2)}` : "⚠️ FX static"}
              </div>
              {lastSaved && <div style={{ fontSize: 9, color: "#1e3a5f", fontFamily: "DM Mono" }}>Saved {lastSaved}</div>}
            </div>
          </div>
        </div>

        {/* ── KPI BANNER ── */}
        <div style={{ background: kpiDelta >= 0 ? "linear-gradient(135deg,#052e16,#064e3b)" : "linear-gradient(135deg,#1f0a0a,#3b0a0a)", border: `1px solid ${kpiDelta >= 0 ? "#065f46" : "#7f1d1d"}`, borderRadius: 14, padding: "14px 20px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div>
            <div style={{ fontSize: 10, color: kpiDelta >= 0 ? "#34d399" : "#f87171", textTransform: "uppercase", letterSpacing: 2, fontFamily: "DM Sans" }}>Monthly KPI — {thisMonth}</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: "#e2e8f0", fontFamily: "DM Mono", marginTop: 2 }}>
              <Pv>{D(netWorth)}</Pv>
            </div>
            {currency !== "INR" && <div style={{ fontSize: 11, color: "#475569", fontFamily: "DM Mono" }}><Pv>{fmtCr(netWorth)}</Pv></div>}
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "#a0aec0", fontFamily: "DM Sans" }}>Conservative Target</div>
            <div style={{ fontSize: 14, fontFamily: "DM Mono", color: "#94a3b8" }}><Pv>{D(conservative)}</Pv></div>
            <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "DM Mono", color: kpiDelta >= 0 ? "#34d399" : "#f87171", marginTop: 2 }}>
              {privacy ? MASK : <>{kpiDelta >= 0 ? "▲" : "▼"} {D(Math.abs(kpiDelta))} ({kpiDelta >= 0 ? "+" : ""}{kpiPct}%)</>}
            </div>
          </div>
        </div>

        {/* ── TABS ── */}
        <div style={{ display: "flex", gap: 4, overflowX: "auto", marginBottom: 16, paddingBottom: 4 }}>
          {TABS.map((t, i) => (
            <button key={i} className={`tab-btn ${tab === i ? "active" : ""}`} onClick={() => setTab(i)}>
              {ICONS[i]} {t}
            </button>
          ))}
        </div>

        {/* ── TAB 0: DASHBOARD ── */}
        {tab === 0 && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
              <StatBox label="Net Worth"        value={D(netWorth)}        sub={currency === "INR" ? `${fmtUSD(netWorth, rates)} · ${fmtQAR(netWorth, rates)}` : `= ${fmtCr(netWorth)}`} color="#f0b429" />
              <StatBox label="Gross Assets"     value={D(grossAssets)}     sub="Before liabilities"  color="#34d399" />
              <StatBox label="Total Liabilities" value={D(totalLiabilities)} sub="Home + Car + CCs"  color="#f87171" />
              <StatBox label="Wealth Rank"      value="Top 1%"             sub="India — Already there ✅" color="#a78bfa" />
            </div>

            {totalInvestPrincipal > 0 && (
              <Card>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, fontFamily: "DM Sans" }}>Investment Portfolio</div>
                  <ViewToggle view={investView} setView={setInvestView} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[
                    { lbl: "Invested", val: totalInvestPrincipal, color: "#94a3b8" },
                    { lbl: "Current",  val: totalInvestCurrent,   color: "#f0b429" },
                  ].map(({ lbl, val, color }) => (
                    <div key={lbl} style={{ background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 10, padding: 12 }}>
                      <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, fontFamily: "DM Sans", marginBottom: 4 }}>{lbl}</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color, fontFamily: "DM Mono" }}><Pv>{D(val)}</Pv></div>
                    </div>
                  ))}
                  <div style={{ background: totalPnL >= 0 ? "#052e16" : "#1f0a0a", border: `1px solid ${totalPnL >= 0 ? "#065f46" : "#7f1d1d"}`, borderRadius: 10, padding: 12 }}>
                    <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, fontFamily: "DM Sans", marginBottom: 4 }}>Total P&L</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: totalPnL >= 0 ? "#34d399" : "#f87171", fontFamily: "DM Mono" }}>
                      <Pv>{totalPnL >= 0 ? "+" : ""}{D(totalPnL)}</Pv>
                    </div>
                    {!privacy && totalPnLPct && <div style={{ fontSize: 9, color: totalPnL >= 0 ? "#34d399" : "#f87171", fontFamily: "DM Mono" }}>{totalPnL >= 0 ? "+" : ""}{totalPnLPct}%</div>}
                  </div>
                </div>
              </Card>
            )}

            <Card>
              <div style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 14, fontFamily: "DM Sans" }}>Progress to Targets</div>
              {TARGETS.map(t => (
                <ProgressBar key={t.label} label={t.label} value={netWorth} max={t.value} sub={`${fmtCr(netWorth)} / ${t.label}`} color={netWorth >= t.value ? "#34d399" : "#f0b429"} />
              ))}
            </Card>

            <Card>
              <div style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 14, fontFamily: "DM Sans" }}>Asset Allocation</div>
              <DonutChart slices={assetSlices} />
            </Card>

            {monthChange !== null && (
              <Card>
                <div style={{ fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontFamily: "DM Sans" }}>Month on Month</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 22, fontWeight: 700, color: monthChange >= 0 ? "#34d399" : "#f87171", fontFamily: "DM Mono" }}>
                      <Pv>{monthChange >= 0 ? "+" : ""}{D(monthChange)}</Pv>
                    </div>
                    <div style={{ fontSize: 11, color: "#64748b", fontFamily: "DM Sans" }}>vs previous snapshot</div>
                  </div>
                  <div style={{ fontSize: 32 }}>{monthChange >= 0 ? "🟢" : "🔴"}</div>
                </div>
              </Card>
            )}
          </>
        )}

        {/* ── TAB 1: ASSETS ── */}
        {tab === 1 && (
          <>
            <SectionTitle n="2" title="Asset Breakdown" icon="🏦" />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: "#475569", fontFamily: "DM Sans" }}>Stocks & MF view:</div>
              <ViewToggle view={investView} setView={setInvestView} />
            </div>

            <InvestmentCard label="US Stocks" principalUSD={usStocksPrincipalUSD} currentUSD={usCurrentUSD}
              view={investView} currency={currency} rates={rates} color="#34d399" loading={loading.portfolio}
              note={portfolio ? `Live from GitHub · $${fmt(usCurrentUSD)} @ ₹${rates.USD_INR.toFixed(1)}/USD` : "Using manual principal as estimate"} />

            <InvestmentCard label="India Stocks" principalINR={indiaStocksPrincipal} currentINR={inCurrentINR}
              view={investView} currency={currency} rates={rates} color="#38bdf8" loading={loading.portfolio}
              note={portfolio ? "Live from GitHub portfolio" : "Using manual principal as estimate"} />

            <InvestmentCard label="Indian Mutual Funds" principalINR={mfPrincipal} currentINR={mfCurrentValue}
              view={investView} currency={currency} rates={rates} color="#818cf8"
              note="Update current value monthly from CAMS / MFCentral" />

            {[
              { label: "F&O Corpus",         val: manual.foCorpus||0,                           note: "Flat — returns fund home EMI ₹40K/month",        color: "#f0b429" },

              {ghStatus && (
                <div style={{ background: "#0d1525", border: "1px solid #1e2d45", borderRadius: 8, padding: "8px 12px", fontSize: 11, marginTop: 10, color: ghStatus.includes("failed") || ghStatus.includes("error") ? "#f87171" : "#34d399", fontFamily: "DM Mono" }}>
                  {ghStatus}
                </div>
              )}
            </Card>
            <Card>
              <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12, fontFamily: "DM Sans" }}>Setup Steps</div>
              {[
                "Create a free private repo on GitHub named my-wealth-data",
                "Inside the repo create a file wealth_data.json with content {}",
                "Generate a Personal Access Token with repo scope — no expiry",
                "Enter details above and click Save Config",
                "Click Load from GitHub to restore your data on any device",
                "Every Save in Update tab auto-pushes to GitHub",
              ].map((s, i) => (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#1e3a5f", border: "1px solid #2d4a6e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#f0b429", fontFamily: "DM Mono", flexShrink: 0, marginTop: 1 }}>{i+1}</div>
                  <div style={{ fontSize: 11, color: "#94a3b8", fontFamily: "DM Sans", lineHeight: 1.5 }}>{s}</div>
                </div>
              ))}
            </Card>
          </>
        )}

        <div style={{ textAlign: "center", padding: "20px 0 8px", fontSize: 9, color: "#1e2d45", fontFamily: "DM Mono" }}>
          SABARNA · DBG WEALTH TRACKER · {new Date().getFullYear()} · PRIVATE & CONFIDENTIAL
        </div>
      </div>
    </PrivacyCtx.Provider>
  );
}

const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(Dashboard));
</script>
</body>
</html>
