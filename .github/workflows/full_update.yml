name: Refresh market data (indices + holdings)

on:
  schedule:
    - cron: "*/15 * * * *"          # every 15 minutes
  workflow_dispatch:                  # manual trigger from Actions tab
  push:
    paths:
      - "data/holdings_cost.json"     # rerun whenever cost basis changes
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch live prices
        run: python scripts/market_data.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/processed)" ]]; then
            git config user.name  "github-actions"
            git config user.email "github-actions@github.com"
            git add data/processed
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "no changes"
          fi
