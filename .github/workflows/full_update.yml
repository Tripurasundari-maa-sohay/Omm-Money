name: Refresh market data (indices + holdings + signals)

on:
  schedule:
    - cron: "*/15 * * * *"          # every 15 minutes
  workflow_dispatch:                  # manual trigger
  push:
    branches: [main]
    paths:
      - "data/holdings_cost.json"    # new position added → fetch prices immediately

permissions:
  contents: write                     # needed to commit the updated JSON back

concurrency:
  group: market-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10              # increased: signals fetch 2y history for ~13 tickers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install yfinance pytz requests beautifulsoup4

      - name: Fetch live prices
        run: python scripts/market_data.py || echo "WARNING: market_data.py failed — partial data may exist"

      - name: Compute signals
        run: python scripts/signals_update.py || echo "WARNING: signals_update.py failed — signals not updated"

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/processed)" ]]; then
            git config pull.rebase true
            git config user.name  "github-actions"
            git config user.email "github-actions@github.com"
            git add data/processed
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi

      - name: Report failure summary
        if: failure()
        run: echo "WORKFLOW FAILURE at $(date -u +%Y-%m-%dT%H:%M:%SZ) — check logs above for root cause"
